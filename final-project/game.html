<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Game Page</title>
    <!-- link to css-->
    <link rel="stylesheet" href="css/game.css">
</head>

<body>

    <div id="game">

        <!-- CURTAINS -->
        <img src="images/curtains-left.png" id="curtainLeft" />
        <img src="images/curtains-right.png" id="curtainRight" />

        <!-- STAGE -->
        <img src="images/stage.png" id="stage" />

        <!-- SEATS -->
        <img src="images/seats.png" id="seats" />

        <!-- LIGHT MAN
        <img src="images/light-bulb.png" id="lightMan" /> -->

        <!-- LIKE MACHINE -->
        <img src="images/like-machine.png" id="like" />

        <!-- HAND MAN -->
        <img src="images/hand-man.png" id="handMan" />

        <!-- TEXT BOX -->
        <div id="dialogueContainer">
            <img src="images/mascot-txt-box.png" id="dialogueBox" />

            <p id="dialogueText">
                Hello! Welcome to the show.
            </p>
            <p id="continueText">click to continue</p>
        </div>

        <!-- LIGHT -->
        <img src="images/light.png" id="light" />

        <!-- SPOTLIGHT -->
        <img src="images/spotlight.png" id="spotLight" />

        <!-- POPUP BOX -->
        <div id="popup" class="hidden">
            <img src="images/mascot-txt-box.png" id="popupBox" alt="Popup dialog box">

            <div id="popupContent">
                <p id="question"></p>

                <input type="text" id="input" placeholder="Type here..." autocomplete="off">

                <button id="OkBtn">OK</button>
            </div>
        </div>

    </div>

    <script src="js/main.js"></script>
    <script src="js/leftCharacter.js"></script>
    <script src="js/rightCharacter.js"></script>
</body>

</html>
